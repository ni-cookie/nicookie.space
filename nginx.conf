# ==========================================
# PROMETHEUS
# ==========================================
server {
    listen 80;
    server_name prometheus.nicookie.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name prometheus.nicookie.space;

    ssl_certificate /etc/letsencrypt/live/prometheus.nicookie.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prometheus.nicookie.space/privkey.pem;

    location / {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==========================================
# PORTAINER
# ==========================================
server {
    listen 80;
    server_name portainer.nicookie.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portainer.nicookie.space;

    ssl_certificate /etc/letsencrypt/live/grafana.nicookie.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.nicookie.space/privkey.pem;

    location / {
        proxy_pass http://portainer:9000;
        proxy_ssl_verify off; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

